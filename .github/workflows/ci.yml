name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust unit tests
        run: cargo test --lib --all-features

      - name: Run Rust integration tests
        run: cargo test --test test_arbitrary_dimension --test test_property_based

  coverage-rust:
    name: Rust Coverage
    runs-on: ubuntu-latest
    needs: test-rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --lib --all-features --lcov --output-path lcov.info
        env:
          RUST_MIN_STACK: 8388608

      - name: Coverage summary
        run: cargo llvm-cov --lib --all-features --summary-only 2>&1 | head -40
        env:
          RUST_MIN_STACK: 8388608

  test-python:
    name: Python Tests (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test-rust
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.10", "3.12"]
        exclude:
          - os: macos-latest
            python-version: "3.8"
          - os: windows-latest
            python-version: "3.8"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build and test (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest numpy hypothesis pytest-cov
          maturin develop --release
          pytest tests/test_python_api.py python/test_nblade.py tests/test_property_based.py \
            --cov=nblade --cov-report=term -v

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m venv .venv
          source .venv/Scripts/activate
          pip install maturin pytest numpy hypothesis pytest-cov
          maturin develop --release
          pytest tests/test_python_api.py python/test_nblade.py tests/test_property_based.py \
            --cov=nblade --cov-report=term -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff and mypy
        run: pip install ruff mypy

      - name: Ruff check
        run: ruff check python/

      - name: Mypy check
        run: mypy python/nblade/
